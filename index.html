<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis 15 Años: Génesis Milena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .font-aurora { font-family: 'Pinyon Script', cursive; }
        .font-body { font-family: 'Quicksand', sans-serif; }
        
        body {
            background: linear-gradient(rgba(255, 255, 255, 0.60), rgba(255, 255, 255, 0.92)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920');
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
        }

        .card-special {
            min-width: 260px;
            height: 380px;
            margin: 0 10px;
            border: 2px solid #d4af37;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            background-image: url('https://www.transparentpng.com/download/floral/pink-flowers-border-png-3.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            padding: 6px;
        }

        .card-special img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            display: block;
        }

        .carrusel-container {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 15px 0;
            scrollbar-width: none;
        }
        .carrusel-container::-webkit-scrollbar { display: none; }

        .img-grid {
            width: 100%; height: 280px; object-fit: cover;
            cursor: pointer; transition: opacity 0.3s ease;
        }

        .nav-link {
            font-size: 11px; font-weight: bold; letter-spacing: 0.1em;
            text-transform: uppercase; color: #1a2e23; white-space: nowrap;
            padding: 8px 14px; border-bottom: 2px solid transparent;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .nav-link.active { 
            color: white; 
            background: #b66481;
            border-bottom: 2px solid #d4af37; 
        }

        #viewer { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="font-body min-h-screen text-[#1a2e23] pb-10">

    <header class="pt-6 pb-2 text-center px-6">
        <h1 class="text-5xl md:text-7xl font-aurora text-[#0f1a14] mb-1">Génesis Milena</h1>
        
        <div class="mb-6 inline-flex items-center gap-3 bg-white/80 px-8 py-1 rounded-full border border-[#d4af37]/30 shadow-sm">
            <span class="text-[#b66481] text-xl">❤</span>
            <p class="text-[26px] font-aurora text-black leading-none pt-1">
                Mis Quince Años 
            </p>
            <span class="text-[#b66481] text-xl">❤</span>
        </div>
    </header>

    <section class="max-w-6xl mx-auto mb-8">
        <h2 class="text-center font-aurora text-5xl text-[#b06d85] mb-2" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">Momentos Especiales</h2>
        <div class="relative px-12">
            <button onclick="scrollCarrusel(-300)" class="absolute left-2 top-1/2 -translate-y-1/2 z-10 bg-white p-2 rounded-full shadow-lg text-[#b06d85] border border-gray-100">❮</button>
            <div id="carrusel-especial" class="carrusel-container"></div>
            <button onclick="scrollCarrusel(300)" class="absolute right-2 top-1/2 -translate-y-1/2 z-10 bg-white p-2 rounded-full shadow-lg text-[#b06d85] border border-gray-100">❯</button>
        </div>
    </section>

    <nav class="flex justify-center gap-2 mb-6 overflow-x-auto px-4">
        <div class="nav-link active" onclick="switchTab('galeria', this)">Galería Completa</div>
        <div class="nav-link" onclick="switchTab('sesion', this)">Sesión de Fotos</div>
        <div class="nav-link" onclick="switchTab('grupales', this)">Fotos Grupales</div>
        <div class="nav-link" onclick="switchTab('videos', this)">Videos</div>
    </nav>

    <main id="tab-galeria" class="tab-content active">
        <section class="max-w-[1100px] mx-auto px-2">
            <div id="grid-galeria" class="grid grid-cols-2 lg:grid-cols-3 gap-1"></div>
        </section>
    </main>

    <main id="tab-sesion" class="tab-content">
        <section class="max-w-[1100px] mx-auto px-2">
            <div id="grid-sesion" class="grid grid-cols-2 lg:grid-cols-3 gap-1"></div>
        </section>
    </main>

    <main id="tab-grupales" class="tab-content">
        <section class="max-w-[1100px] mx-auto px-2">
            <div id="grid-grupales" class="grid grid-cols-2 lg:grid-cols-3 gap-1"></div>
        </section>
    </main>

    <main id="tab-videos" class="tab-content">
        <section class="max-w-[800px] mx-auto px-6">
            <div class="aspect-video bg-black rounded shadow-2xl overflow-hidden mb-6">
                <video class="w-full h-full" controls>
                    <source src="Video Project.mp4" type="video/mp4">
                    Tu navegador no soporta videos.
                </video>
            </div>
        </section>
    </main>

    <div id="viewer">
        <button onclick="closeViewer()" class="absolute top-6 right-8 text-white text-5xl">&times;</button>
        <div class="flex items-center justify-between w-full px-4">
            <button onclick="changeImage(-1)" class="text-white/50 text-5xl">❮</button>
            <img id="viewer-img" src="" class="max-w-[90vw] max-h-[75vh] border-2 border-white/20 shadow-2xl">
            <button onclick="changeImage(1)" class="text-white/50 text-5xl">❯</button>
        </div>
        <div class="mt-8">
            <a id="download-link" href="#" download class="bg-[#b06d85] text-white px-12 py-4 rounded-full font-bold uppercase tracking-widest shadow-xl">Descargar Foto</a>
        </div>
    </div>

    <script>
        const fotos_especiales = [
            "Gemini_Generated_Image_aq2yabaq2yabaq2y.png",
            "Gemini_Generated_Image_iuuzpxiuuzpxiuuz.png",
            "Imagen2.jpg",
            "Imagen3.jpg",
            "Imagen5.jpg",
            "Imagen6.jpg"
        ];

        const fotos_sesion = ["Gemini_Generated_Image_aq2yabaq2yabaq2y.png", "Gemini_Generated_Image_iuuzpxiuuzpxiuuz.png", "Imagen2.jpg"];
        const fotos_grupales = ["WhatsApp Image 2026-04-07 at 23.54.38.jpeg", "Imagen3.jpg", "Imagen5.jpg"];
        const fotos_todas = [...fotos_sesion, ...fotos_grupales, "Imagen6.jpg", "Imagen7.jpg"];

        let currentList = fotos_todas;
        let currentIndex = 0;

        const carrusel = document.getElementById('carrusel-especial');
        fotos_especiales.forEach((src, i) => {
            carrusel.innerHTML += `
                <div class="card-special">
                    <img src="${src}" onclick="openViewer(${i}, 'especial')">
                </div>`;
        });

        function render(list, id) {
            const container = document.getElementById(id);
            if(container) {
                list.forEach((foto, i) => {
                    container.innerHTML += `<img src="${foto}" class="img-grid" onclick="openViewer(${i}, '${id}')">`;
                });
            }
        }
        render(fotos_todas, 'grid-galeria');
        render(fotos_sesion, 'grid-sesion');
        render(fotos_grupales, 'grid-grupales');

        function scrollCarrusel(amount) {
            document.getElementById('carrusel-especial').scrollBy({ left: amount, behavior: 'smooth' });
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const target = document.getElementById('tab-' + tab);
            if(target) target.classList.add('active');
            el.classList.add('active');
        }

        function openViewer(index, source) {
            if(source === 'especial') currentList = fotos_especiales;
            else if(source === 'grid-sesion') currentList = fotos_sesion;
            else if(source === 'grid-grupales') currentList = fotos_grupales;
            else currentList = fotos_todas;

            currentIndex = index;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateViewer() {
            const src = currentList[currentIndex];
            document.getElementById('viewer-img').src = src;
            document.getElementById('download-link').href = src;
        }

        function changeImage(step) {
            currentIndex = (currentIndex + step + currentList.length) % currentList.length;
            updateViewer();
        }
    </script>
</body>
</html>
