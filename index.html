<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis 15 Años: Génesis Milena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .font-aurora { font-family: 'Pinyon Script', cursive; }
        .font-body { font-family: 'Quicksand', sans-serif; }
        body {
            background: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920');
            background-size: cover; background-attachment: fixed; background-position: center;
        }
        .carousel-container {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 1rem; padding: 1rem 0; scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .carousel-container::-webkit-scrollbar { display: none; }
        .glass-card {
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px);
            border: 0.1px solid rgba(176, 109, 133, 0.1); border-radius: 4px; overflow: hidden;
        }
        #viewer { 
            display: none; position: fixed; inset: 0; background: #000; 
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-main-download {
            background: #b06d85; color: white; padding: 12px 30px; border-radius: 4px;
            font-size: 12px; font-weight: bold; letter-spacing: 0.15em; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(176, 109, 133, 0.3);
        }
    </style>
</head>
<body class="font-body min-h-screen text-[#1a2e23] pb-20">

    <header class="pt-16 pb-10 text-center px-6">
        <div class="text-3xl mb-3 text-[#b06d85]">👑</div>
        <h1 class="text-6xl md:text-8xl font-aurora text-[#0f1a14] mb-2">Génesis Milena</h1>
        <p class="text-[9px] tracking-[0.6em] font-bold uppercase text-[#4a554f]">Mis Quince Años</p>
    </header>

    <section class="max-w-[1200px] mx-auto px-4 mb-16">
        <h2 class="font-aurora text-4xl text-center mb-6 text-[#b06d85]">Momentos Favoritos</h2>
        <div id="carrusel-dinamico" class="carousel-container">
            </div>
    </section>

    <section class="max-w-[900px] mx-auto px-6">
        <h2 class="font-aurora text-4xl text-center mb-10 text-[#b06d85]">Galería Completa</h2>
        <div id="galeria-dinamica" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </section>

    <div id="viewer">
        <div class="absolute top-6 w-full px-6 flex justify-between items-center z-10">
            <p id="image-counter" class="text-white/40 text-[10px] uppercase tracking-widest font-bold"></p>
            <button onclick="closeViewer()" class="text-white text-3xl p-2">✕</button>
        </div>
        <div class="flex items-center justify-between w-full px-2">
            <button onclick="changeImage(-1)" class="text-white/30 text-3xl px-4 md:opacity-100">←</button>
            <img id="viewer-img" src="" class="max-w-[90vw] max-h-[65vh] shadow-2xl rounded-sm">
            <button onclick="changeImage(1)" class="text-white/30 text-3xl px-4 md:opacity-100">→</button>
        </div>
        <div class="mt-10">
            <a id="download-link" href="#" download class="btn-main-download">Descargar</a>
        </div>
    </div>

    <footer class="mt-24 py-10 text-center border-t border-[#b06d85]/10">
        <p class="text-[8px] font-bold uppercase tracking-[0.5em] text-[#b06d85]">Génesis Milena • 2026</p>
    </footer>

    <script>
        // 1. LISTADO DE FOTOS (Pon todas aquí separadas por comas)
        const misFotos = [
            "Gemini_Generated_Image_aq2yabaq2yabaq2y.png", 
            "Gemini_Generated_Image_iuuzpxiuuzpxiuuz.png", 
            "WhatsApp Image 2026-04-07 at 23.54.38.jpeg",
            "Imagen2.jpg",
            "Imagen3.jpg",
            "Imagen6.jpg",
            "Imagen5.jpg",
            "Imagen7.jpg",
            // Puedes seguir agregando más: "foto4.jpg", "foto5.jpg"...
        ];

        const carrusel = document.getElementById('carrusel-dinamico');
        const galeria = document.getElementById('galeria-dinamica');
        const viewer = document.getElementById('viewer');
        const viewerImg = document.getElementById('viewer-img');
        const downloadLink = document.getElementById('download-link');
        const counter = document.getElementById('image-counter');
        let currentIndex = 0;

        // 2. GENERACIÓN AUTOMÁTICA DE LA PÁGINA
        misFotos.forEach((foto, index) => {
            // Crear items para el carrusel (Solo los primeros 3 o todos si prefieres)
            if(index < 5) { // Aquí limitamos a 5 destacados para el carrusel
                carrusel.innerHTML += `
                    <div class="flex-shrink-0 w-[85%] md:w-[320px] scroll-snap-align-center">
                        <div class="glass-card">
                            <img src="${foto}" class="w-full h-[450px] object-cover cursor-pointer" onclick="openViewer(${index})">
                        </div>
                    </div>`;
            }

            // Crear items para la galería de abajo
            galeria.innerHTML += `
                <div class="glass-card p-1 shadow-sm">
                    <img src="${foto}" class="w-full h-auto cursor-pointer" onclick="openViewer(${index})">
                </div>`;
        });

        // 3. FUNCIONES DEL VISOR
        function openViewer(index) {
            currentIndex = index;
            updateViewer();
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            viewer.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateViewer() {
            const currentSrc = misFotos[currentIndex];
            viewerImg.src = currentSrc;
            downloadLink.href = currentSrc;
            downloadLink.download = `Genesis_Milena_${currentIndex + 1}.jpg`;
            counter.innerText = `${currentIndex + 1} / ${misFotos.length}`;
        }

        function changeImage(step) {
            currentIndex += step;
            if (currentIndex >= misFotos.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = misFotos.length - 1;
            updateViewer();
        }

        // Gestos y Teclado
        let touchStartX = 0;
        viewer.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        viewer.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) changeImage(1);
            if (touchEndX - touchStartX > 50) changeImage(-1);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeViewer();
            if (e.key === "ArrowRight") changeImage(1);
            if (e.key === "ArrowLeft") changeImage(-1);
        });
    </script>
</body>
</html>
