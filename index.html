<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 Años: Génesis Milena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .font-aurora { font-family: 'Pinyon Script', cursive; }
        .font-body { font-family: 'Quicksand', sans-serif; }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 179, 163, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Estilo del botón de descarga */
        .btn-download {
            background: #b06d85;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-download:hover {
            background: #8e566a;
            transform: scale(1.02);
        }

        /* Animación para el modal */
        #modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="font-body min-h-screen text-[#1a2e23]">

    <header class="py-12 text-center max-w-4xl mx-auto px-6">
        <div class="text-4xl mb-4">👑</div>
        <h1 class="text-5xl md:text-7xl font-aurora text-[#0f1a14] mb-2 drop-shadow-sm">Génesis Milena</h1>
        <p class="text-[10px] tracking-[0.5em] font-bold uppercase text-[#4a554f]">Mis Quince Años • 2026</p>
    </header>

    <main class="max-w-[1100px] mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 p-6 mb-20">
        
        <div class="glass-card p-4">
            <div class="overflow-hidden rounded-lg border border-gray-100 shadow-sm">
                <img src="https://via.placeholder.com/600x800" 
                     alt="Génesis Milena" 
                     class="w-full h-[500px] object-cover cursor-zoom-in hover:opacity-95 transition"
                     onclick="openModal(this.src)">
            </div>
            <div class="mt-6 text-center">
                <h3 class="font-aurora text-3xl mb-1">Recuerdo Especial</h3>
                <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-4">Click en la foto para ampliar</p>
                <a href="[url=https://ibb.co/23h1vkLp][img]https://i.ibb.co/HT4ftHM9/Gemini-Generated-Image-aq2yabaq2yabaq2y.png[/img][/url]" download="Genesis_Milena_1.jpg" target="_blank" class="btn-download block w-full py-3 rounded-lg font-bold text-[10px] uppercase">
                    Descargar Imagen HD
                </a>
            </div>
        </div>

        <div class="glass-card p-4">
            <div class="overflow-hidden rounded-lg border border-gray-100 shadow-sm">
                <img src="https://via.placeholder.com/600x800" 
                     alt="Génesis Milena" 
                     class="w-full h-[500px] object-cover cursor-zoom-in hover:opacity-95 transition"
                     onclick="openModal(this.src)">
            </div>
            <div class="mt-6 text-center">
                <h3 class="font-aurora text-3xl mb-1">Momento Mágico</h3>
                <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-4">Click en la foto para ampliar</p>
                <a href="https://via.placeholder.com/600x800" download="Genesis_Milena_2.jpg" target="_blank" class="btn-download block w-full py-3 rounded-xl font-bold text-[10px] uppercase">
                    Descargar Imagen HD
                </a>
            </div>
        </div>

    </main>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex flex-col items-center justify-center p-4" onclick="closeModal()">
        <span class="absolute top-5 right-8 text-white text-4xl cursor-pointer">&times;</span>
        <img id="modal-img" src="" class="max-w-full max-h-[80vh] rounded shadow-2xl border-2 border-white/20">
        <p class="text-white/70 mt-4 text-xs uppercase tracking-widest">Toca cualquier lugar para cerrar</p>
    </div>

    <footer class="py-10 text-center opacity-60">
        <p class="text-[9px] font-bold uppercase tracking-[0.4em]">Quito, Ecuador • 2026</p>
    </footer>

    <script>
        function openModal(imgSrc) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = imgSrc;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Evita que se mueva el fondo
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
