<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 Años: Génesis Milena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .font-aurora { font-family: 'Pinyon Script', cursive; }
        .font-body { font-family: 'Quicksand', sans-serif; }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.65)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 179, 163, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .btn-download {
            background: #b06d85;
            color: white;
            transition: all 0.3s ease;
        }

        /* Estilo para el visor de imagen */
        #viewer { transition: all 0.3s ease; display: none; }
    </style>
</head>
<body class="font-body min-h-screen text-[#1a2e23]">

    <header class="py-16 text-center max-w-4xl mx-auto px-6">
        <div class="text-4xl mb-4">👑</div>
        <h1 class="text-5xl md:text-7xl font-aurora text-[#0f1a14] mb-2">Génesis Milena</h1>
        <p class="text-[10px] tracking-[0.5em] font-bold uppercase text-[#4a554f]">Mis Quince Años • 2026</p>
    </header>

    <main class="max-w-[1100px] mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 p-6 mb-24">
        
        <div class="glass-card p-5">
            <div class="overflow-hidden rounded-lg border-[1.5px] border-white shadow-md">
                <img src="foto1.jpg" alt="Recuerdo 1" class="w-full h-[550px] object-cover cursor-zoom-in" onclick="viewImage(this.src)">
            </div>
            <div class="mt-6 text-center">
                <h3 class="font-aurora text-3xl text-[#0f1a14] mb-4">Recuerdo Especial</h3>
                <a href="foto1.jpg" download="Genesis_Milena_1.jpg" class="btn-download block w-full py-3 rounded-lg font-bold uppercase text-[9px] tracking-widest">
                    Descargar Foto HD
                </a>
            </div>
        </div>

        <div class="glass-card p-5">
            <div class="overflow-hidden rounded-lg border-[1.5px] border-white shadow-md">
                <img src="Gemini_Generated_Image_aq2yabaq2yabaq2y.png" alt="Recuerdo 2" class="w-full h-[550px] object-cover cursor-zoom-in" onclick="viewImage(this.src)">
            </div>
            <div class="mt-6 text-center">
                <h3 class="font-aurora text-3xl text-[#0f1a14] mb-4">Momento Mágico</h3>
                <a href="foto2.jpg" download="Genesis_Milena_2.jpg" class="btn-download block w-full py-3 rounded-lg font-bold uppercase text-[9px] tracking-widest">
                    Descargar Foto HD
                </a>
            </div>
        </div>

    </main>

    <div id="viewer" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 cursor-pointer" onclick="closeViewer()">
        <img id="viewer-img" src="" class="max-w-full max-h-[90vh] rounded shadow-2xl border-2 border-white/20">
        <p class="absolute bottom-5 text-white/50 text-[10px] uppercase tracking-widest">Toca para cerrar</p>
    </div>

    <footer class="py-12 text-center opacity-60">
        <p class="text-[9px] font-bold uppercase tracking-[0.4em]">Quito, Ecuador • 2026</p>
    </footer>

    <script>
        function viewImage(src) {
            document.getElementById('viewer-img').src = src;
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Bloquea el scroll
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto'; // Libera el scroll
        }
    </script>
</body>
</html>
