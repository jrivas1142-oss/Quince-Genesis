<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis 15 Años: Génesis Milena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .font-aurora { font-family: 'Pinyon Script', cursive; }
        .font-body { font-family: 'Quicksand', sans-serif; }
        
        body {
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920');
            background-size: cover; background-attachment: fixed; background-position: center;
        }
        
        /* Imágenes de Galería: Puras y acopladas */
        .img-grid-item {
            width: 100%; height: 320px; object-fit: cover;
            cursor: pointer; transition: opacity 0.3s ease;
            border-radius: 2px;
        }
        .img-grid-item:hover { opacity: 0.85; }

        /* Navegación Adaptable con letra un poco más grande */
        .nav-container {
            display: flex; justify-content: center; gap: 6px;
            overflow-x: auto; padding: 10px; margin-bottom: 25px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .nav-container::-webkit-scrollbar { display: none; }

        .nav-link {
            font-size: 11px; /* Aumentado de 9px a 11px */
            font-weight: bold; letter-spacing: 0.12em;
            text-transform: uppercase; color: #4a554f; white-space: nowrap;
            padding: 10px 16px; border-bottom: 2px solid transparent;
            transition: all 0.3s ease; cursor: pointer;
        }
        .nav-link.active {
            color: #b06d85; border-bottom: 2px solid #b06d85;
        }

        /* Contenido por pestañas */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Visor Fullscreen */
        #viewer { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); 
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }

        .btn-download {
            background: #b06d85; color: white; padding: 15px 45px; border-radius: 4px;
            font-size: 12px; font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(176, 109, 133, 0.4);
        }
    </style>
</head>
<body class="font-body min-h-screen text-[#1a2e23] pb-20">

    <header class="pt-16 pb-6 text-center px-6">
        <div class="text-3xl mb-3 text-[#b06d85]">👑</div>
        <h1 class="text-6xl md:text-8xl font-aurora text-[#0f1a14] mb-2">Génesis Milena</h1>
        <p class="text-[12px] tracking-[0.6em] font-bold uppercase text-[#4a554f] mb-8">Mis Quince Años • Tosagua 2026</p>
        
        <nav class="nav-container max-w-2xl mx-auto">
            <div class="nav-link active" onclick="switchTab('galeria', this)">Galería Completa</div>
            <div class="nav-link" onclick="switchTab('sesion', this)">Sesión de Fotos</div>
            <div class="nav-link" onclick="switchTab('grupales', this)">Fotos Grupales</div>
            <div class="nav-link" onclick="switchTab('videos', this)">Videos</div>
        </nav>
    </header>

    <main id="tab-galeria" class="tab-content active">
        <section class="max-w-[1100px] mx-auto px-2">
            <div id="grid-galeria" class="grid grid-cols-2 lg:grid-cols-3 gap-1"></div>
        </section>
    </main>

    <main id="tab-sesion" class="tab-content">
        <section class="max-w-[1100px] mx-auto px-2">
            <div id="grid-sesion" class="grid grid-cols-2 lg:grid-cols-3 gap-1"></div>
        </section>
    </main>

    <main id="tab-grupales" class="tab-content">
        <section class="max-w-[1100px] mx-auto px-2">
            <div id="grid-grupales" class="grid grid-cols-2 lg:grid-cols-3 gap-1"></div>
        </section>
    </main>

    <main id="tab-videos" class="tab-content">
        <section class="max-w-[800px] mx-auto px-6">
            <div class="aspect-video bg-black rounded shadow-2xl overflow-hidden mb-6">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
            <p class="text-center text-[10px] uppercase tracking-widest opacity-40">Video Especial de la Quinceañera y de la fiesta </p>
        </section>
    </main>

    <div id="viewer">
        <div class="absolute top-6 w-full px-8 flex justify-between items-center z-10">
            <p id="image-counter" class="text-white/40 text-[10px] uppercase tracking-widest font-bold"></p>
            <button onclick="closeViewer()" class="text-white text-4xl p-2">&times;</button>
        </div>
        <div class="flex items-center justify-between w-full px-2">
            <button onclick="changeImage(-1)" class="text-white/20 text-4xl px-4">←</button>
            <img id="viewer-img" src="" class="max-w-[95vw] max-h-[70vh] shadow-2xl">
            <button onclick="changeImage(1)" class="text-white/20 text-4xl px-4">→</button>
        </div>
        <div class="mt-12">
            <a id="download-link" href="#" download class="btn-download">Descargar Foto</a>
        </div>
    </div>

    <footer class="mt-24 py-10 text-center border-t border-[#b06d85]/10">
        <p class="text-[8px] font-bold uppercase tracking-[0.5em] text-[#b06d85]">Génesis Milena • 2026</p>
    </footer>

    <script>
        // CONFIGURACIÓN DE FOTOS
        const fotos_sesion = [
            "Gemini_Generated_Image_aq2yabaq2yabaq2y.png",
            "Imagen2.jpg",
            "Imagen3.jpg"
        ];
        const fotos_grupales = [
            "Gemini_Generated_Image_iuuzpxiuuzpxiuuz.png",
            "WhatsApp Image 2026-04-07 at 23.54.38.jpeg",
            "Imagen6.jpg"
        ];
        
        const fotos_todas = [...fotos_sesion, ...grupales];

        let currentList = fotos_todas;
        let currentIndex = 0;

        function render(list, id) {
            const container = document.getElementById(id);
            list.forEach((foto, i) => {
                container.innerHTML += `<img src="${foto}" class="img-grid-item" onclick="openViewer(${i}, '${id}')">`;
            });
        }

        render(fotos_todas, 'grid-galeria');
        render(fotos_sesion, 'grid-sesion');
        render(fotos_grupales, 'grid-grupales');

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            el.classList.add('active');
        }

        function openViewer(index, gridId) {
            if(gridId === 'grid-sesion') currentList = fotos_sesion;
            else if(gridId === 'grid-grupales') currentList = fotos_grupales;
            else currentList = fotos_todas;

            currentIndex = index;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateViewer() {
            const src = currentList[currentIndex];
            document.getElementById('viewer-img').src = src;
            document.getElementById('download-link').href = src;
            document.getElementById('image-counter').innerText = `${currentIndex + 1} de ${currentList.length}`;
        }

        function changeImage(step) {
            currentIndex = (currentIndex + step + currentList.length) % currentList.length;
            updateViewer();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeImage(1);
            if (e.key === "ArrowLeft") changeImage(-1);
            if (e.key === "Escape") closeViewer();
        });
    </script>
</body>
</html>
